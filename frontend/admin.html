<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Onnoy-অন্বয়</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .admin-container { padding: 40px 0; }
        .admin-card { background: var(--white); border-radius: var(--radius); padding: 30px; box-shadow: var(--shadow); margin-bottom: 30px; border: 1px solid var(--green-pale); }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .request-item { border-bottom: 1px solid var(--green-pale); padding: 15px 0; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .badge-pending { background: #fff3e0; color: #ef6c00; }
        .login-overlay { position: fixed; inset: 0; background: var(--paper); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
    </style>
</head>
<body>

    <div id="loginOverlay" class="login-overlay">
        <div class="login-box admin-card">
            <h2>Admin Login</h2>
            <p>Enter your token to access the Onnoy-অন্বয় Dashboard.</p>
            <input type="password" id="adminToken" class="form-control" placeholder="Admin Token" style="margin: 20px 0;">
            <button onclick="checkLogin()" class="btn btn-green w-full">Enter Dashboard</button>
        </div>
    </div>

    <div class="container admin-container" id="mainContent" style="display:none;">
        <div class="admin-header">
            <h1>Onnoy-অন্বয় Admin Dashboard</h1>
            <button onclick="logout()" class="btn btn-outline">Logout</button>
        </div>

        <div class="admin-card">
            <h3>Live Impact Stats</h3>
            <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 20px; margin-top: 20px;">
                <div class="form-group"><label>Sessions</label><input type="number" id="inp-sessions" class="form-control"></div>
                <div class="form-group"><label>Students</label><input type="number" id="inp-students" class="form-control"></div>
                <div class="form-group"><label>Districts</label><input type="number" id="inp-districts" class="form-control"></div>
                <div class="form-group"><label>Satisfaction %</label><input type="number" id="inp-satisfaction" class="form-control"></div>
            </div>
            <button onclick="updateImpact()" class="btn btn-green" style="margin-top:20px;">Update Live Data</button>
        </div>

        <div class="admin-card">
            <h3>Recent Requests</h3>
            <div id="requestsList"><p>Loading...</p></div>
        </div>
    </div>

    <script>
        let TOKEN = localStorage.getItem('onnoy_admin_token');
        const API_BASE = 'http://localhost:5000/api';

        async function init() {
            if (!TOKEN) return;
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            const res = await fetch(`${API_BASE}/impact`);
            const json = await res.json();
            if (json.ok) {
                document.getElementById('inp-sessions').value = json.data.sessions;
                document.getElementById('inp-students').value = json.data.students;
                document.getElementById('inp-districts').value = json.data.districts;
                document.getElementById('inp-satisfaction').value = json.data.satisfaction;
            }

            const reqRes = await fetch(`${API_BASE}/requests`, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
            const reqJson = await reqRes.json();
            if (reqJson.ok) {
                document.getElementById('requestsList').innerHTML = reqJson.data.length ? reqJson.data.reverse().map(r => `
                    <div class="request-item">
                        <span class="badge badge-pending">Pending</span> <strong>${r.name}</strong> - ${r.college} (${r.district})<br>
                        <small>${new Date(r.submitted_at).toLocaleString()}</small>
                    </div>
                `).join('') : '<p>No requests yet.</p>';
            }
        }

        function checkLogin() {
            TOKEN = document.getElementById('adminToken').value;
            localStorage.setItem('onnoy_admin_token', TOKEN);
            init();
        }

        function logout() {
            localStorage.removeItem('onnoy_admin_token');
            location.reload();
        }

        async function updateImpact() {
            const data = {
                sessions: parseInt(document.getElementById('inp-sessions').value),
                students: parseInt(document.getElementById('inp-students').value),
                districts: parseInt(document.getElementById('inp-districts').value),
                satisfaction: parseInt(document.getElementById('inp-satisfaction').value)
            };
            const res = await fetch(`${API_BASE}/impact`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
                body: JSON.stringify(data)
            });
            if ((await res.json()).ok) alert('Impact data updated!');
            else alert('Failed to update. Check token.');
        }

        init();
    </script>
</body>
</html>
