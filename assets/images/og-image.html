<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onnoy OG Image</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1200px;
      height: 630px;
      overflow: hidden;
      background: #1A6B3A;
      font-family: Arial, sans-serif;
      color: #ffffff;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .canvas {
      position: relative;
      width: 1200px;
      height: 630px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      box-sizing: border-box;
      padding: 60px 80px 40px;
    }
    .background-shape {
      position: absolute;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      filter: blur(2px);
    }
    .circle-1 { width: 360px; height: 360px; top: 40px; left: 120px; }
    .circle-2 { width: 260px; height: 260px; top: 120px; right: 140px; }
    .circle-3 { width: 420px; height: 420px; bottom: 90px; left: 180px; }
    .circle-4 { width: 220px; height: 220px; bottom: 60px; right: 120px; }
    .title-small {
      font-size: 24px;
      letter-spacing: 0.08em;
      margin-bottom: 20px;
      color: rgba(255,255,255,1);
    }
    .title-main {
      font-size: 80px;
      font-weight: 900;
      line-height: 0.95;
      margin: 0;
    }
    .subtitle {
      font-size: 28px;
      margin: 22px 0 16px;
      color: #E8A020;
      font-weight: 600;
    }
    .divider {
      width: 180px;
      height: 1px;
      background: rgba(255,255,255,0.85);
      margin: 0 auto 24px;
    }
    .description {
      font-size: 20px;
      line-height: 1.5;
      max-width: 840px;
      color: rgba(255,255,255,0.85);
      margin: 0 auto;
    }
    .footer {
      position: absolute;
      right: 40px;
      bottom: 24px;
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      letter-spacing: 0.02em;
    }
  </style>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=GA_MEASUREMENT_ID"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'GA_MEASUREMENT_ID');
</script>
</head>
<body>
  <div class="canvas">
    <div class="background-shape circle-1"></div>
    <div class="background-shape circle-2"></div>
    <div class="background-shape circle-3"></div>
    <div class="background-shape circle-4"></div>
    <div class="title-small">অন্বয়</div>
    <h1 class="title-main">Onnoy</h1>
    <div class="subtitle">Ethical Use of Technology</div>
    <div class="divider"></div>
    <div class="description">Free sessions for Grade 11–12 students · Mymensingh, Bangladesh</div>
    <div class="footer">onnoy.vercel.app</div>
  </div>
</body>
</html>
